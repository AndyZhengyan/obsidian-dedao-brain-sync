version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      test-and-build-tools:
        patterns:
          - "@types/*"
          - "eslint*"
          - "typescript*"
          - "vitest"
          - "happy-dom"
          - "esbuild"
      runtime:
        patterns:
          - "preact"
          - "react"
          - "react-dom"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Shanghai
