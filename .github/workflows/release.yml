name: Release

on:
  push:
    tags: ['[0-9]*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Verify version matches tag
        id: version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          MANIFEST_VERSION=$(node -e "console.log(require('./manifest.json').version)")
          PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          if ! grep -Fq "## 🎉 $TAG_VERSION 最新更新" README.md; then
            echo "README.md latest-update heading does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          if ! grep -Fq "## 🎉 $TAG_VERSION — Latest Update" README_EN.md; then
            echo "README_EN.md latest-update heading does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag, manifest, package, and README versions match: $TAG_VERSION"

      - name: Find previous tag
        id: prev-tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.version.outputs.version }}
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
          previous_tag: ${{ steps.prev-tag.outputs.prev_tag }}

      - name: Attest Build Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "main.js,manifest.json,styles.css"
