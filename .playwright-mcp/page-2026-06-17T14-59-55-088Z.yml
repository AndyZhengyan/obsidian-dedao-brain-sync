          - text: 默认关闭，以兼容历史行为。开启后，RAGFS 会根据 object key / 文件名后缀推断 MIME 类型，并写入 S3 对象的
          - code [ref=e2068]: Content-Type
          - text: ：
        - list [ref=e2069]:
