            - generic [ref=e1123]: "\"stream\": true"
            - generic [ref=e1124]: "}"
            - generic [ref=e1125]: "}"
        - blockquote [ref=e1126]:
          - paragraph [ref=e1127]:
            - strong [ref=e1128]: 注意
            - text: ": OpenAI SDK 需要"
            - code [ref=e1129]: stream=true
            - text: 才能正确解析 SSE 响应。使用强制返回 SSE 格式的 provider 时，必须将此选项设置为
            - code [ref=e1130]: "true"
            - text: 。
        - heading "query_planner Permalink to \"query_planner\"" [level=3] [ref=e1131]:
          - text: query_planner
          - link "Permalink to \"query_planner\"" [ref=e1132] [cursor=pointer]:
            - /url: "#query-planner"
            - text: "#"
        - paragraph [ref=e1133]:
          - text: 可选的轻量模型配置，用于检索前的意图分析和 query 规划/改写。配置结构与
          - code [ref=e1134]: vlm
          - text: 相同，但只影响
          - code [ref=e1135]: search()
          - text: 的意图分析和 query expansion。未配置或配置为空时，OpenViking 会回退到
          - code [ref=e1136]: vlm
          - text: ，保持向后兼容。
        - blockquote [ref=e1137]:
          - paragraph [ref=e1138]:
            - text: 在
            - code [ref=e1139]: openviking-server init
            - text: 里可勾选启用本地轻量 query planner，向导会自动拉取 Ollama 模型并写入
            - code [ref=e1140]: query_planner
            - text: 配置。对于已知的 query planner 模型，
            - code [ref=e1141]: search()
            - text: 会在运行时自动选择匹配的内置 prompt；不在映射表中的模型继续使用
            - code [ref=e1142]: retrieval.intent_analysis
            - text: 。
        - paragraph [ref=e1143]:
          - text: 推荐优先使用本地 Ollama 模型
          - link "guoxuter/ov_intent_analysis_sft:v7_q8" [ref=e1144] [cursor=pointer]:
            - /url: https://ollama.com/guoxuter/ov_intent_analysis_sft:v7_q8
            - code [ref=e1145]: guoxuter/ov_intent_analysis_sft:v7_q8
          - text: 。该模型基于 Qwen3.5-0.8B 进行微调，可本地部署，适合用小模型承担检索规划：在闲聊、问候或上下文已足够的场景下拒绝检索，从而减少不必要的记忆注入和 token 消耗；需要检索时，再生成面向
          - code [ref=e1146]: skill
          - text: 、
          - code [ref=e1147]: resource
          - text: 、
          - code [ref=e1148]: memory
          - text: 的结构化查询。此前的
          - link "v4_q8" [ref=e1149] [cursor=pointer]:
            - /url: https://ollama.com/guoxuter/ov_intent_analysis_sft:v4_q8
            - code [ref=e1150]: v4_q8
          - text: 版本仍作为可选项继续支持。
        - paragraph [ref=e1151]: 使用前请先拉取模型，并确保 Ollama 服务可访问：
        - generic [ref=e1152]:
          - button "Copy Code" [ref=e1153] [cursor=pointer]
          - generic [ref=e1154]: bash
          - code [ref=e1156]:
            - generic [ref=e1157]: ollama pull guoxuter/ov_intent_analysis_sft:v7_q8
        - paragraph [ref=e1158]: 然后在 OpenViking 配置中添加：
        - generic [ref=e1159]:
          - button "Copy Code" [ref=e1160] [cursor=pointer]
          - generic [ref=e1161]: json
          - code [ref=e1163]:
            - generic [ref=e1164]: "{"
            - generic [ref=e1165]: "\"query_planner\": {"
            - generic [ref=e1166]: "\"provider\": \"litellm\","
            - generic [ref=e1167]: "\"model\": \"ollama/guoxuter/ov_intent_analysis_sft:v7_q8\","
            - generic [ref=e1168]: "\"api_base\": \"http://127.0.0.1:11434\","
            - generic [ref=e1169]: "\"temperature\": 0.0,"
            - generic [ref=e1170]: "\"timeout\": 60,"
            - generic [ref=e1171]: "\"extra_request_body\": {"
            - generic [ref=e1172]: "\"think\": false"
            - generic [ref=e1173]: "}"
            - generic [ref=e1174]: "}"
            - generic [ref=e1175]: "}"
        - paragraph [ref=e1176]:
          - text: 对于
          - code [ref=e1177]: ollama/guoxuter/ov_intent_analysis_sft:v7_q8
          - text: （以及
          - code [ref=e1178]: v4_q8
          - text: ），OpenViking 会在 search 阶段自动使用对应的内置 prompt（分别为
          - code [ref=e1179]: retrieval.ov_intent_analysis_sft_v7
          - text: 和
          - code [ref=e1180]: retrieval.ov_intent_analysis_sft_v4
          - text: ），不需要替换 prompt 文件，也不需要设置
          - code [ref=e1181]: prompts.templates_dir
          - text: 。如果使用未映射的模型，OpenViking 会继续使用默认的
          - code [ref=e1182]: retrieval.intent_analysis
          - text: prompt。
        - paragraph [ref=e1183]:
          - text: 这样可以用小模型承担检索规划，降低延迟，同时保留更强的
          - code [ref=e1184]: vlm
          - text: 处理语义提取、记忆提取和多模态内容。
