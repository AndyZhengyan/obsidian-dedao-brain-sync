        - paragraph [ref=e2771]:
          - text: 任务跟踪器记录异步任务状态，适用于返回
          - code [ref=e2772]: task_id
          - text: 的接口（任务类型包括
          - code [ref=e2773]: session_commit
          - text: 、
          - code [ref=e2774]: add_resource
          - text: 、
          - code [ref=e2775]: add_skill
          - text: 、
          - code [ref=e2776]: admin_reindex
          - text: ）。Task 记录始终持久化到 AGFS，因此一个实例返回的
          - code [ref=e2777]: task_id
          - text: 可以在另一个实例上查询，任务历史也能在重启后继续访问。
        - paragraph [ref=e2778]:
          - text: 无需配置
          - code [ref=e2779]: storage.task_tracker
          - text: 。如果旧配置里仍包含
          - code [ref=e2780]: storage.task_tracker
          - text: ，OpenViking 会记录 warning 并忽略它。
        - paragraph [ref=e2781]: Task 记录文件位于所属账号的系统目录：
