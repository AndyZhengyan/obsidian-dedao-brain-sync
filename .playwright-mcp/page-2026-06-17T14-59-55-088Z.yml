        - paragraph [ref=e2032]:
          - code [ref=e2033]: directory_marker_mode
          - text: 用来控制 RAGFS 在 S3 中如何落目录对象：
        - list [ref=e2034]:
          - listitem [ref=e2035]:
            - code [ref=e2036]: empty
            - text: 是默认值。RAGFS 会写入 0 字节目录 marker，并保留空目录语义。
          - listitem [ref=e2037]:
            - code [ref=e2038]: nonempty
            - text: 会写入非空目录 marker。对于 TOS 这类拒绝 0 字节目录 marker 的 S3 兼容后端，应使用这个模式。
          - listitem [ref=e2039]:
            - code [ref=e2040]: none
            - text: 会让 RAGFS 采用更接近原生 S3 prefix 的目录语义，不再创建目录 marker 对象。此时空目录不会被持久化，只有目录下至少存在一个子对象后，相关目录才可能被发现。
        - paragraph [ref=e2041]: 典型选择：
        - list [ref=e2042]:
          - listitem [ref=e2043]:
            - text: 对 MinIO、SeaweedFS 以及大多数 PathStyle 后端，保持默认
            - code [ref=e2044]: empty
            - text: 即可。
          - listitem [ref=e2045]:
            - text: 对 TOS 或其他拒绝 0 字节目录 marker 的 VirtualHostStyle 后端，使用
            - code [ref=e2046]: nonempty
            - text: 。
          - listitem [ref=e2047]:
            - text: 如果你想完全使用 prefix 风格行为，并且不需要持久化空目录，可以使用
            - code [ref=e2048]: none
            - text: 。
        - paragraph [ref=e2049]:
          - code [ref=e2050]: normalize_encoding_chars
          - text: 用来控制 RAGFS 在发起 S3 请求前需要重写哪些字符：
        - list [ref=e2051]:
          - listitem [ref=e2052]:
            - text: 默认值是
            - code [ref=e2053]: "\"?#%+@\""
            - text: ，所以只会转义
            - code [ref=e2054]: "?"
            - text: 、
